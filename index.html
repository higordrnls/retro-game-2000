<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Game 2000</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.8);
            touch-action: none;
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from './meu_jogo_y2k-4285690c65216a32.js';

        function habilitarToqueNoCanvas() {
            const canvas = document.querySelector('canvas');
            if (!canvas) {
                return;
            }

            if (canvas.dataset.touchBridgeInstalled === '1') {
                return;
            }

            canvas.dataset.touchBridgeInstalled = '1';
            canvas.tabIndex = 0;
            canvas.focus({ preventScroll: true });

            const dispararMouse = (tipo, touch, botoes) => {
                canvas.dispatchEvent(new MouseEvent(tipo, {
                    bubbles: true,
                    cancelable: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY,
                    button: 0,
                    buttons: botoes,
                }));
            };

            canvas.addEventListener('touchstart', (evento) => {
                if (evento.cancelable) {
                    evento.preventDefault();
                }

                for (const touch of evento.changedTouches) {
                    dispararMouse('mousemove', touch, 1);
                    dispararMouse('mousedown', touch, 1);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (evento) => {
                if (evento.cancelable) {
                    evento.preventDefault();
                }

                for (const touch of evento.changedTouches) {
                    dispararMouse('mousemove', touch, 1);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (evento) => {
                if (evento.cancelable) {
                    evento.preventDefault();
                }

                for (const touch of evento.changedTouches) {
                    dispararMouse('mouseup', touch, 0);
                    dispararMouse('click', touch, 0);
                }
            }, { passive: false });

            canvas.addEventListener('touchcancel', (evento) => {
                if (evento.cancelable) {
                    evento.preventDefault();
                }

                for (const touch of evento.changedTouches) {
                    dispararMouse('mouseup', touch, 0);
                }
            }, { passive: false });
        }

        init('./meu_jogo_y2k-4285690c65216a32_bg.wasm').then(() => {
            const tentativas = 30;
            let contador = 0;

            const intervalo = setInterval(() => {
                habilitarToqueNoCanvas();
                if (document.querySelector('canvas') || contador >= tentativas) {
                    clearInterval(intervalo);
                }
                contador += 1;
            }, 100);
        });
    </script>
</body>
</html>
