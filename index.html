<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Game 2000</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.8);
            touch-action: none;
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from './meu_jogo_y2k-4285690c65216a32.js';

        function habilitarToqueNoCanvas() {
            const canvas = document.querySelector('canvas');
            if (!canvas) {
                return;
            }

            const bloquearPadrao = (evento) => evento.preventDefault();
            canvas.addEventListener('touchstart', bloquearPadrao, { passive: false });
            canvas.addEventListener('touchmove', bloquearPadrao, { passive: false });
            canvas.addEventListener('touchend', bloquearPadrao, { passive: false });
        }

        init('./meu_jogo_y2k-4285690c65216a32_bg.wasm').then(() => {
            const tentativas = 30;
            let contador = 0;

            const intervalo = setInterval(() => {
                habilitarToqueNoCanvas();
                if (document.querySelector('canvas') || contador >= tentativas) {
                    clearInterval(intervalo);
                }
                contador += 1;
            }, 100);
        });
    </script>
</body>
</html>
